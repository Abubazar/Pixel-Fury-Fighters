<!DOCTYPE html>
<html lang="en">
<head>
    <script src="script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Fury Fighter - Pick a Character</title>
</head>

<style>
        body{
            padding: 0;
            margin:0;
            font-family: monospace;
            margin:0;
            height: 100vh;
            display:flex;
            flex-direction: column;
        }
        .hero{
            display: flex;
            align-items: center;
            justify-content:center;
            
            font-weight: 800;
            font-size: large;
            color: white;
            background-color: rgb(255, 94, 0);
            padding: 10px; margin: 0;
        }
        .sectionB{
            display:flex;
            justify-content: left;
            gap: 50px;
        }
        #menu{
            display:flex;
            align-items:center;
            justify-content:center;
            background-color: grey;
            width: max-content;
            height: 400px;
        }
        canvas{
            background-color: grey;
            width: 200px;
            height: 200px;
        }
    </style>

<body>
    <div class="hero">
        <a>Fury Fighters</a>
    </div>

    <div class="sectionB">

        <div id="menu">
            <a>Pick your Game Mode</a>
        </div>

        <div id="deco">
            <canvas id="lookhole"></canvas>
        </div>
    </div>
    <footer><a>Special thanks to </a> <a href="https://itch.io/profile/luizmelo">luizmelo</a> <a> for the free characters</a></footer>
</body>
</html>
